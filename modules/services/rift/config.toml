[settings]
animate = true
animation_duration = 1.5
animation_fps = 100.0
default_disable = false
focus_follows_mouse = true
mouse_follows_focus = false
mouse_hides_on_focus = false
auto_focus_blacklist = []
run_on_start = []
hot_reload = true

[settings.ui.mission_control]
enabled = true
fade_enabled = true

[settings.gestures]
enabled = true
fingers = 3
invert_horizontal_swipe = false
swipe_vertical_tolerance = 0.4
skip_empty = true
distance_pct = 0.08
haptics_enabled = false
haptic_pattern = "level_change"

[settings.layout]
mode = "traditional"

[settings.layout.scrolling]
animate = true

column_width_ratio = 0.5
min_column_width_ratio = 0.3
max_column_width_ratio = 1.0
alignment = "left"
focus_navigation_style = "niri"

[settings.layout.stack]
default_orientation = "vertical"

[settings.layout.master_stack]
master_side = "left"
master_ratio = 0.6
master_count = 1
new_window_placement = "stack"

[settings.layout.gaps.outer]
top = 4
left = 4
bottom = 4
right = 4

[settings.layout.gaps.inner]
horizontal = 5
vertical = 5

[virtual_workspaces]
enabled = true
default_workspace_count = 5
auto_assign_windows = true
preserve_focus_per_workspace = true
workspace_auto_back_and_forth = false
reapply_app_rules_on_title_change = false
workspace_rules = [
  { workspace = 0, layout = "master_stack" },
  { workspace = 1, layout = "stack" },
]
workspace_names = ["1", "2", "3", "4", "5"]
app_rules = [
  { app_id = "com.apple.finder", manage = false },
  { app_id = "com.apple.systempreferences", manage = false },
]

[modifier_combinations]
move = "Alt + Shift"

[keys]
"Alt + 1" = { switch_to_workspace = 0 }
"Alt + 2" = { switch_to_workspace = 1 }
"Alt + 3" = { switch_to_workspace = 2 }
"Alt + 4" = { switch_to_workspace = 3 }
"Alt + 5" = { switch_to_workspace = 4 }

"move + 1" = { move_window_to_workspace = 0 }
"move + 2" = { move_window_to_workspace = 1 }
"move + 3" = { move_window_to_workspace = 2 }
"move + 4" = { move_window_to_workspace = 3 }
"move + 5" = { move_window_to_workspace = 4 }

"Alt + Z" = "toggle_space_activated"

"move + Tab" = "show_mission_control_all"
"Alt + Escape" = "dismiss_mission_control"

"Alt + Tab" = "switch_to_last_workspace"

"Alt + Space" = "toggle_focus_floating"
"Alt + Shift + Space" = "toggle_window_floating"
"Alt + F" = "toggle_fullscreen_within_gaps"

"Alt + Shift + Equal" = "resize_window_grow"
"Alt + Shift + Minus" = "resize_window_shrink"
